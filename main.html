<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>GitHub Issues Tracker</title>
  </head>
  <body>
    <header>
      <div>
        <div class="navbar flex justify-between bg-base-100 shadow-sm">
          <div class="flex items-center gap-2">
            <img
              class="w-9 cursor-pointer"
              src="assets/github-logo.png"
              alt=""
            />
            <a class="text-xl hidden sm:inline cursor-pointer font-bold"
              >GitHub Issues Tracker</a
            >
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <div class="dropdown dropdown-end">
              <button class="btn btn-primary">Search</button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main class="max-w-[1920px] mx-auto">
      <div class="w-[95%] mx-auto">
        <!-- Button area -->
        <div class="mt-[60px] border-2 p-3 border-gray-200">
          <button id="allFilter" class="btn btn-active btn-primary">All</button>
          <button id="openFilter" class="btn btn-active">Open</button>
          <button id="closeFilter" class="btn btn-active">Closed</button>
        </div>

        <!-- Count area -->
        <div
          class="mt-4 border-2 p-3 border-gray-200 flex flex-wrap gap-4 items-center justify-center sm:justify-between"
        >
          <div class="flex items-center gap-3">
            <div class="bg-[#ECE4FF] p-2 rounded-full">
              <img src="assets/Aperture.png" alt="" />
            </div>
            <div>
              <h4 class="font-semibold text-[20px]">50 Issues</h4>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-4 items-center">
            <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
            <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
          </div>
        </div>

        <!-- Loading effect -->
        <div
          id="loading"
          class="items-center justify-center mt-10 md:mt-15 hidden"
        >
          <div><span class="loading loading-spinner loading-xl"></span></div>
        </div>
        <!-- Content area -->
        <div id="contentArea" class="mt-4 px-2">
          <!-- Card container -->
          <div
            id="cardContainer"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
          >
            <!-- Card -->
          </div>
        </div>
      </div>
    </main>

    <!-- Modal -->
    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div>
          <h4 class="font-semibold text-[14px]">Fix broken image uploads</h4>
          <div class="flex flex-wrap items-center gap-1 text-[12px] mt-2">
            <p class="bg-[#00A96E] text-white px-2 rounded-full">Open</p>
            <p>Opened by Fahim Ahmed</p>
            <p>22/02/2026</p>
          </div>
          <div class="flex gap-1 text-[10px] mt-3">
            <p
              class="uppercase text-[#EF4444] bg-[#FECACA] rounded-full px-3 py-0.5"
            >
              <i class="fa-solid fa-bug"></i> Bug
            </p>
            <p
              class="uppercase text-[#EF4444] bg-[#FECACA] rounded-full px-3 py-0.5"
            >
              <i class="fa-solid fa-bug"></i> Bug
            </p>
          </div>
          <p class="text-[#64748B] text-[12px] mt-3 text-justify">
            The navigation menu doesn't collapse properly on mobile devices.
            Need to fix the responsive behavior.
          </p>
        </div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="scripts/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>GitHub Issues Tracker - Login</title>
  </head>
  <body>
    <main>
      <section class="bg-[#F8FAFC] py-15 px-4">
        <div class="max-w-[520px] bg-white mx-auto p-8 rounded-xl shadow-2xl">
          <div class="text-center">
            <img class="mx-auto" src="assets/github-logo.png" alt="Logo" />
            <h3 class="font-semibold text-2xl mt-6 mb-2 text-[#1F2937]">
              GitHub Issues Tracker
            </h3>
            <p class="text-[#64748B] mb-6">Sign in to manage your issues</p>
          </div>
          <div class="flex flex-col">
            <label class="font-medium mb-2" for="userName">Username</label>
            <input
              class="input w-full"
              type="text"
              id="userName"
              placeholder="Enter Username"
            />
            <label class="font-medium mb-2 mt-4" for="password">Password</label>
            <input
              class="input w-full"
              type="password"
              id="password"
              placeholder="Enter Password"
            />
          </div>
          <div class="text-center mt-6">
            <button id="singinBtn" class="btn btn-primary w-full">
              Sign In
            </button>
          </div>
          <div class="py-6">
            <fieldset class="border-t border-gray-400 text-center">
              <legend class="mx-auto px-4 text-[#1F2937]">OR</legend>
            </fieldset>
          </div>
          <div class="text-center">
            <p class="text-[#64748B] mb-2">Demo Credentials:</p>
          </div>
          <div class="text-center bg-[#F8FAFC] py-6 rounded-lg">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
          </div>
        </div>
      </section>
    </main>
    <!-- Modal -->
    <dialog id="my_modal_3" class="modal max-w-[520px] mx-auto">
      <div class="modal-box">
        <form method="dialog">
          <button
            class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2"
          >
            ✕
          </button>
        </form>
        <h3 class="text-lg font-bold text-error">Error!</h3>
        <p class="py-4">Invalid Username or Password</p>
      </div>
    </dialog>
    <script src="scripts/login.js"></script>
  </body>
</html>
